<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1000" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="tdBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1612"/>
      <stop offset="100%" stop-color="#0d0a08"/>
    </linearGradient>
    <linearGradient id="tdAccent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#c6a15b" stop-opacity="0.4"/>
      <stop offset="50%" stop-color="#c6a15b" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#c6a15b" stop-opacity="0.4"/>
    </linearGradient>
  </defs>
  <rect width="1600" height="1000" fill="url(#tdBg)"/>
  <g transform="translate(0,300)">
    <rect x="200" y="50" width="1200" height="450" rx="20" fill="#0d0a08" stroke="url(#tdAccent)" stroke-width="2"/>
    <g transform="translate(400,150)">
      <rect x="0" y="0" width="800" height="250" rx="12" fill="#1a1612" stroke="#c6a15b" stroke-width="1" opacity="0.6"/>
      <g stroke="#c6a15b" stroke-width="0.5" opacity="0.4" fill="none">
        <line x1="0" y1="50" x2="800" y2="50"/>
        <line x1="0" y1="100" x2="800" y2="100"/>
        <line x1="0" y1="150" x2="800" y2="150"/>
        <line x1="0" y1="200" x2="800" y2="200"/>
        <line x1="100" y1="0" x2="100" y2="250"/>
        <line x1="200" y1="0" x2="200" y2="250"/>
        <line x1="300" y1="0" x2="300" y2="250"/>
        <line x1="400" y1="0" x2="400" y2="250"/>
        <line x1="500" y1="0" x2="500" y2="250"/>
        <line x1="600" y1="0" x2="600" y2="250"/>
        <line x1="700" y1="0" x2="700" y2="250"/>
      </g>
      <g transform="translate(280,90)">
        <rect width="240" height="80" fill="#211C18" stroke="#c6a15b" stroke-width="1.5" opacity="0.8"/>
        <rect x="10" y="10" width="220" height="60" fill="#c6a15b" opacity="0.2"/>
      </g>
